name: Deploy to Dev Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip
          unzip -q Godot_v4.6.1-stable_linux.x86_64.zip
          mv Godot_v4.6.1-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Install Godot Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.1.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz
          unzip -q Godot_v4.6.1-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.6.1.stable/

      - name: Set server main scene
        run: |
          sed -i 's|run/main_scene=.*|run/main_scene="res://scenes/server_main.tscn"|' project.godot

      - name: Import project assets
        run: |
          timeout 120 godot --headless --import 2>&1 || true
          sleep 10
          echo "=== Checking uid cache ==="
          ls -la .godot/ 2>/dev/null || echo "No .godot dir"
          ls -la .godot/uid_cache.bin 2>/dev/null || echo "No uid cache"

      - name: Patch project.godot to use direct paths for autoloads
        run: |
          python3 << 'PYEOF'
          import os, re

          # Build UID -> path mapping from all .gd files
          uid_map = {}
          for root, dirs, files in os.walk('.'):
              # Skip .godot folder
              dirs[:] = [d for d in dirs if d != '.godot']
              for f in files:
                  if f.endswith('.gd'):
                      path = os.path.join(root, f)
                      try:
                          with open(path, 'r', encoding='utf-8') as fh:
                              first_lines = fh.read(500)
                          m = re.search(r'#\s*(uid://[a-z0-9]+)', first_lines)
                          if m:
                              uid = m.group(1)
                              res_path = 'res://' + path.lstrip('./').replace('\\', '/')
                              uid_map[uid] = res_path
                      except:
                          pass

          print(f"Built UID map with {len(uid_map)} entries")

          # Read project.godot
          with open('project.godot', 'r') as f:
              proj = f.read()

          # Replace uid:// in autoload section with direct paths
          def replace_uid(m):
              uid = m.group(0)
              if uid in uid_map:
                  print(f"Replacing {uid} -> {uid_map[uid]}")
                  return uid_map[uid]
              print(f"WARNING: No mapping for {uid}")
              return uid

          patched = re.sub(r'uid://[a-z0-9]+', replace_uid, proj)

          with open('project.godot', 'w') as f:
              f.write(patched)

          print("Done patching project.godot")
          PYEOF

      - name: Export Linux Server build
        run: |
          godot --headless --export-release "Linux" ../avatard-server.x86_64 2>&1 || true

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy to server
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
          ssh $SERVER_USER@$SERVER_IP "systemctl stop avatard-dev"
          scp ../avatard-server.x86_64 $SERVER_USER@$SERVER_IP:/opt/avatard/dev/
          scp ../avatard-server.pck $SERVER_USER@$SERVER_IP:/opt/avatard/dev/
          ssh $SERVER_USER@$SERVER_IP "chmod +x /opt/avatard/dev/avatard-server.x86_64 && systemctl start avatard-dev"
          echo "Dev server updated successfully"
